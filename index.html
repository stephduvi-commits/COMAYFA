<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="meta-theme" content="#F49634">
<title id="page-title">Panneau d'information</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="COMAYFA">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{
  --accent:#F49634;--accent-dk:#D47820;--accent-bg:#FFF5E8;--accent-bg2:#FFF0DC;
  --bg:#F7F8FC;--white:#FFFFFF;--text:#1A1A2E;--muted:#7A7A95;--border:#E8EAF0;
  --red:#EF4444;--red-bg:#FEE2E2;--green:#10B981;
  --r:14px;--r-sm:8px;--tap:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
::selection{background:transparent;color:inherit;}
::-moz-selection{background:transparent;color:inherit;}
html{font-size:16px;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;touch-action:manipulation;}

/* ═══ SPLASH ════════════════════════════════════════════════ */
#splash{position:fixed;inset:0;z-index:2000;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;transition:opacity .4s,transform .4s;overflow-y:auto;}
#splash.hide{opacity:0;transform:scale(.97);pointer-events:none;}
.splash-logo{width:80px;height:52px;border-radius:12px;background:white;border:2px solid #F9C999;display:flex;align-items:center;justify-content:center;margin-bottom:14px;overflow:hidden;}
.splash-logo img{width:100%;height:100%;object-fit:contain;padding:4px 8px;}
.splash-title{font-size:19px;font-weight:900;text-align:center;margin-bottom:3px;}
.splash-sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:22px;}
.splash-lang-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.lang-btns{display:flex;gap:10px;margin-bottom:22px;width:100%;max-width:360px;}
.lang-btn{flex:1;padding:12px 6px;border-radius:var(--r);border:2px solid var(--border);background:var(--white);cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;}
.lang-btn:hover,.lang-btn:active{border-color:var(--accent);background:var(--accent-bg);}
.lang-btn.selected{border-color:var(--accent);background:var(--accent);color:white;}
.lang-btn .flag{font-size:22px;display:block;margin-bottom:3px;}
.lang-btn .lname{font-size:11px;font-weight:700;}
.splash-news{width:100%;max-width:400px;background:var(--bg);border-radius:var(--r);padding:12px;margin-bottom:16px;display:none;}
.splash-news-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.splash-news-item{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);}
.splash-news-item:last-child{border-bottom:none;padding-bottom:0;}
.splash-news-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.badge-new{background:#D1FAE5;color:#059669;}.badge-event{background:var(--accent-bg);color:var(--accent-dk);}
.splash-news-text strong{display:block;font-size:12px;font-weight:700;color:var(--text);}
.splash-news-text span{font-size:10px;color:var(--muted);}
.splash-notif{width:100%;max-width:400px;background:linear-gradient(135deg,#25D366,#1ebe57);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px;text-decoration:none;color:white;margin-bottom:8px;}
.splash-notif svg{width:26px;height:26px;flex-shrink:0;}
.splash-notif-text .t1{font-size:13px;font-weight:700;}.splash-notif-text .t2{font-size:11px;opacity:.85;}
.splash-sms{width:100%;max-width:400px;background:var(--accent);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px;text-decoration:none;color:white;margin-bottom:16px;}
.splash-sms svg{width:20px;height:20px;flex-shrink:0;}
.splash-sms-text .t1{font-size:13px;font-weight:700;}.splash-sms-text .t2{font-size:11px;opacity:.85;}
.btn-enter{width:100%;max-width:400px;padding:16px;border-radius:var(--r);border:none;background:var(--accent);color:white;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(244,150,52,.35);letter-spacing:.3px;}
.btn-enter svg{width:18px;height:18px;}
.btn-enter:active{opacity:.85;transform:scale(.98);}

/* ═══ APP WRAPPER ═══════════════════════════════════════════ */
#app{display:none;min-height:100vh;}

/* ═══ HEADER COMPACT ════════════════════════════════════════ */
.app-header{
  background:var(--accent);
  padding:0 14px;
  height:54px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(244,150,52,.3);
}
.app-header-left{display:flex;align-items:center;gap:10px;min-width:0;}
.app-header-logo{
  width:52px;height:30px;border-radius:5px;
  background:white;padding:2px 6px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;
}
.app-header-logo img{width:100%;height:100%;object-fit:contain;}
.app-header-title{
  font-size:14px;font-weight:800;color:white;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.2;
}
.app-header-sub{font-size:10px;color:rgba(255,255,255,.75);}
.app-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.lang-switch{
  background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);
  color:white;padding:5px 9px;border-radius:6px;
  font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;
  white-space:nowrap;
}
.header-clock{font-size:10px;color:rgba(255,255,255,.85);text-align:right;font-weight:600;line-height:1.3;}

/* ═══ HOME — GRILLE DE NAVIGATION ═══════════════════════════ */
#home-screen{padding:16px 14px 100px;}
.home-greeting{
  background:var(--white);border-radius:var(--r);padding:14px 16px;
  margin-bottom:16px;border:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.home-greeting-icon{font-size:28px;flex-shrink:0;}
.home-greeting-text h2{font-size:15px;font-weight:800;color:var(--text);}
.home-greeting-text p{font-size:12px;color:var(--muted);margin-top:2px;}

/* Grille principale */
.nav-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:16px;
}
.nav-card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px 14px 16px;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;cursor:pointer;
  transition:transform .12s,box-shadow .12s,border-color .12s;
  position:relative;overflow:hidden;
  min-height:100px;
  border-top:3px solid var(--accent);
  -webkit-user-select:none;user-select:none;
}
.nav-card.red-card{border-top-color:var(--red);}
.nav-card:active{transform:scale(.95);box-shadow:0 2px 8px rgba(0,0,0,.12);}
.nav-card-icon{
  width:48px;height:48px;border-radius:14px;
  background:var(--accent-bg);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;flex-shrink:0;
}
.nav-card.red-card .nav-card-icon{background:var(--red-bg);}
.nav-card-icon svg{width:24px;height:24px;}
.nav-card-label{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;}
.nav-card-sub{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.3;}
.nav-card-badge{
  position:absolute;top:8px;right:8px;
  background:var(--green);color:white;
  font-size:9px;font-weight:700;
  padding:2px 6px;border-radius:10px;
  text-transform:uppercase;letter-spacing:.3px;
}

/* Carte pleine largeur */
.nav-card.full{grid-column:1/-1;flex-direction:row;text-align:left;padding:14px 16px;min-height:auto;}
.nav-card.full .nav-card-icon{margin-bottom:0;margin-right:14px;flex-shrink:0;}
.nav-card.full .nav-card-text{flex:1;}

/* ═══ CONTENT PANEL ═════════════════════════════════════════ */
#content-screen{display:none;padding:0 0 80px;}
.content-topbar{
  background:var(--accent);
  padding:0 14px;height:50px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:54px;z-index:90;
}
.content-topbar.red-bar{background:var(--red);}
.back-btn-content{
  background:rgba(255,255,255,.2);border:none;color:white;
  width:34px;height:34px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:0;
}
.back-btn-content svg{width:18px;height:18px;}
.content-topbar-title{font-size:15px;font-weight:800;color:white;flex:1;}
.content-body{padding:14px 14px;}

/* ═══ COMPOSANTS CONTENU ════════════════════════════════════ */
/* Règles */
.rules-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:360px){.rules-grid{grid-template-columns:1fr;}}
.rule-card{background:var(--white);border-radius:var(--r);padding:14px;border:1px solid var(--border);position:relative;overflow:hidden;border-top:3px solid var(--accent);}
.rule-icon-wrap{width:34px;height:34px;border-radius:9px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.rule-icon-wrap svg{width:18px;height:18px;}
.rule-num{position:absolute;top:10px;right:11px;font-size:26px;font-weight:900;color:var(--accent-bg2);line-height:1;}
.rule-card h3{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.3;overflow-wrap:break-word;}
.rule-card p{font-size:12px;color:var(--muted);line-height:1.55;overflow-wrap:break-word;}

/* Contacts */
.contacts-list{display:flex;flex-direction:column;gap:10px;}
.contact-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;}
.contact-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--bar,var(--accent));}
.contact-info{flex:1;min-width:0;overflow:hidden;}
.contact-name{font-weight:700;font-size:15px;}
.contact-role{font-size:12px;color:var(--muted);margin-top:1px;overflow-wrap:break-word;}
.contact-tel{
  text-decoration:none;background:var(--accent);color:white;
  padding:10px 14px;border-radius:10px;
  font-size:14px;font-weight:700;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:5px;
  min-height:var(--tap);
}
.contact-tel svg{width:14px;height:14px;}
@media(max-width:360px){.contact-card{flex-wrap:wrap;}.contact-tel{width:100%;justify-content:center;margin-top:6px;}}

/* Horaires */
.horaires-list{display:flex;flex-direction:column;gap:12px;}
.horaire-group{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.horaire-group-title{background:var(--accent);padding:11px 16px;display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:white;}
.horaire-group-title svg{width:16px;height:16px;flex-shrink:0;}
.horaire-rows{padding:4px 0;}
.horaire-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;font-size:14px;border-bottom:1px solid var(--border);gap:8px;}
.horaire-row:last-child{border-bottom:none;}
.horaire-label{color:var(--muted);font-size:13px;}
.horaire-value{font-weight:700;text-align:right;}
.horaire-closed{font-weight:700;color:var(--red);}

/* Annonces */
.annonces-list{display:flex;flex-direction:column;gap:12px;}
.annonce-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;gap:12px;}
.annonce-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.annonce-icon svg{width:20px;height:20px;}
.annonce-icon.urgent{background:#FEE2E2;}.annonce-icon.info{background:#D1FAE5;}.annonce-icon.normal{background:var(--accent-bg);}
.annonce-body{flex:1;min-width:0;}
.annonce-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;}
.annonce-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
.badge-urgent{background:#FEE2E2;color:#DC2626;}.badge-info{background:#D1FAE5;color:#059669;}.badge-normal{background:var(--accent-bg);color:var(--accent-dk);}
.annonce-date{font-size:10px;color:var(--muted);}
.annonce-title{font-weight:700;font-size:15px;margin-bottom:4px;}
.annonce-text{font-size:13px;color:var(--muted);line-height:1.55;overflow-wrap:break-word;}
.new-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-left:4px;vertical-align:middle;}

/* Événements */
.events-list{display:flex;flex-direction:column;gap:12px;}
.event-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;gap:14px;align-items:flex-start;}
.event-date{background:var(--accent);color:white;border-radius:10px;padding:8px 10px;text-align:center;min-width:52px;flex-shrink:0;}
.event-date .day{font-size:24px;font-weight:900;line-height:1;}
.event-date .month{font-size:10px;text-transform:uppercase;font-weight:700;letter-spacing:.5px;margin-top:2px;}
.event-body{flex:1;min-width:0;}
.event-title{font-weight:800;font-size:15px;margin-bottom:3px;overflow-wrap:break-word;}
.event-desc{font-size:13px;color:var(--muted);margin-bottom:7px;overflow-wrap:break-word;}
.event-time{display:inline-flex;align-items:center;gap:5px;background:var(--accent-bg);color:var(--accent-dk);font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;}
.event-time svg{width:12px;height:12px;}

/* Contenu libre incendie */
.free-content{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;font-size:14px;line-height:1.8;white-space:pre-wrap;overflow-wrap:break-word;border-left:4px solid var(--red);}

/* Vide */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}

/* Plan du site */
.plan-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.plan-img{width:100%;display:block;cursor:zoom-in;touch-action:pinch-zoom;}
.plan-caption{padding:10px 14px;font-size:12px;color:var(--muted);text-align:center;}
.plan-fullscreen-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;border:none;background:var(--accent-bg);color:var(--accent-dk);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border-top:1px solid var(--border);}
#plan-modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.92);flex-direction:column;align-items:center;justify-content:center;}
#plan-modal.open{display:flex;}
#plan-modal img{max-width:100%;max-height:90vh;object-fit:contain;touch-action:pinch-zoom;}
#plan-modal-close{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.15);border:none;color:white;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Liens utiles */
.liens-grid{display:flex;flex-direction:column;gap:10px;padding:12px;}
.lien-btn{display:flex;align-items:center;gap:14px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;text-decoration:none;color:var(--text);padding:12px 14px;transition:background .15s,box-shadow .15s;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.lien-btn:active{background:var(--accent-bg);}
@media(hover:hover){.lien-btn:hover{background:var(--accent-bg);box-shadow:0 2px 10px rgba(0,0,0,.08);}}
.lien-btn-img{width:56px;height:56px;object-fit:contain;border-radius:8px;flex-shrink:0;}
.lien-btn-fallback{font-size:32px;line-height:1;flex-shrink:0;width:56px;text-align:center;}
.lien-btn-texts{flex:1;display:flex;flex-direction:column;gap:3px;}
.lien-btn-line{font-size:13px;line-height:1.4;}
.lien-btn-lang{font-size:10px;font-weight:800;color:var(--muted);margin-right:5px;letter-spacing:.4px;}

/* ═══ TOAST ════════════════════════════════════════════════ */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--green);color:white;padding:10px 22px;border-radius:22px;font-size:14px;font-weight:700;opacity:0;transition:opacity .25s,transform .25s;z-index:9999;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 32px);text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══ LANG PICKER ═══════════════════════════════════════════ */
#lang-picker{display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.5);}
#lang-picker > div{position:absolute;bottom:0;left:0;right:0;background:white;border-radius:16px 16px 0 0;padding:20px;}

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

/* Rendu d'une icône contact */
function renderContactIcon(iconKey) {
  const def = ICON_DEFS[iconKey] || ICON_DEFS.user;
  let svgContent = def.svg;
  // Cas spécial ELU : logo image
  if(iconKey === 'elu') {
    return `<div style="width:38px;height:38px;border-radius:10px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:4px">
      <img src="${ELU_LOGO_SRC}" alt="ELU" style="width:100%;height:100%;object-fit:contain">
    </div>`;
  }
  const color = def.color.startsWith('var(') ? def.color : def.color;
  return `<div style="width:38px;height:38px;border-radius:10px;background:${def.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;color:${color}">${svgContent.replace(/currentColor/g, color)}</div>`;
}

/* Couleur de la barre latérale contact */
function contactBarColor(iconKey) {
  const red = ['garde','infirmerie','pompiers','ambulance','police'];
  return red.includes(iconKey) ? '#EF4444' : 'var(--accent)';
}

/* Couleur bouton téléphone */
function contactBtnColor(iconKey) {
  const red = ['garde','infirmerie','pompiers','ambulance','police'];
  return red.includes(iconKey) ? '#EF4444' : 'var(--accent)';
}

const SCHEMA_VERSION=4;
let DATA=(()=>{try{
  const d=JSON.parse(localStorage.getItem('panneau_v4'));
  if(d&&d._schemaVersion===SCHEMA_VERSION) return d;
  return JSON.parse(JSON.stringify(DEFAULT));
}catch(e){return JSON.parse(JSON.stringify(DEFAULT));}})();

═══════════════════════════════════════════════════════ */
function t(key){ return I18N[LANG]?.[key] || I18N.fr[key] || key; }
function tl(obj){ if(!obj) return ''; if(typeof obj==='string') return obj; return obj[LANG]||obj.fr||obj.en||Object.values(obj)[0]||''; }

function selectLang(lang, btn){
  LANG=lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('selected'));
  if(btn) btn.classList.add('selected');
  updateSplashTexts();
}
function changeLang(lang){
  LANG=lang;
  localStorage.setItem('panneau_lang',lang);
  hideLangPicker();
  const lsb=document.getElementById('lang-switch-btn');
  if(lsb) lsb.textContent=I18N[lang].langSwitch;
  // Mettre à jour header
  const ttl=document.getElementById('hdr-title');
  const sub=document.getElementById('hdr-subtitle');
  if(ttl) ttl.textContent=DATA.titre;
  if(sub) sub.textContent=DATA.sousTitre;
  // Si on est dans un sous-menu, recharger ce contenu dans la nouvelle langue
  const cs=document.getElementById('content-screen');
  if(cs && cs.style.display==='block'){
    const activeTabId=cs.dataset.activeTab;
    if(activeTabId) openContent(activeTabId);
  } else {
    renderNavGrid();
  }
}
function showLangPicker(){
  document.getElementById('lang-picker').style.display='block';
  ['fr','nl','en'].forEach(l=>{
    const b=document.getElementById('lp-'+l);
    if(b) b.classList.toggle('selected',l===LANG);
  });
}
function hideLangPicker(){ document.getElementById('lang-picker').style.display='none'; }

   NOUVEAUTÉS
═══════════════════════════════════════════════════════ */
function getNewItems(){
  const lastVisit=parseInt(localStorage.getItem(LAST_VISIT_KEY)||'0');
  const items=[];
  DATA.annonces.filter(a=>a.isNew).forEach(a=>{
    items.push({type:'annonce', title:tl(a[LANG]||a.fr).titre||'', date:a.date});
  });
  DATA.events.filter(e=>e.isNew).forEach(e=>{
    items.push({type:'event', title:tl(e[LANG]||e.fr).titre||'', date:e.jour+' '+tl(e.mois)});
  });
  return items;
}

function updateSplashTexts(){
  const lang=LANG, T=I18N[lang];
  document.getElementById('btn-enter-text').textContent=T.enterBtn;
  document.getElementById('splash-news-title-text').textContent=T.newsTitle;
  document.getElementById('splash-wa-t1').textContent=DATA.waLabelFr&&lang==='nl'?DATA.waLabelNl:DATA.waLabelFr&&lang==='en'?DATA.waLabelEn:DATA.waLabelFr||T.waBtn;
  document.getElementById('splash-wa-t2').textContent=T.waSub;
  document.getElementById('splash-sms-t1').textContent=DATA.smsLabelFr&&lang==='nl'?DATA.smsLabelNl:DATA.smsLabelFr&&lang==='en'?DATA.smsLabelEn:DATA.smsLabelFr||T.smsBtn;
  document.getElementById('splash-sms-t2').textContent=T.smsSub;

  // Nouveautés
  const items=getNewItems();
  const newsEl=document.getElementById('splash-news');
  const newsList=document.getElementById('splash-news-list');
  if(items.length>0){
    newsEl.style.display='block';
    newsList.innerHTML=items.map(it=>`
      <div class="splash-news-item">
        <span class="splash-news-badge ${it.type==='event'?'badge-event':'badge-new'}">${it.type==='event'?T.badgeEvent:T.badgeNew}</span>
        <div class="splash-news-text"><strong>${esc(it.title)}</strong><span>${esc(it.date)}</span></div>
      </div>`).join('');
  } else {
    newsEl.style.display='none';
  }

  // Boutons notif
  const waEl=document.getElementById('splash-wa');
  const smsEl=document.getElementById('splash-sms');
  if(DATA.hideNotif||(!DATA.waUrl&&!DATA.smsUrl)){
    waEl.style.display='none'; smsEl.style.display='none';
  } else {
    if(DATA.waUrl){ waEl.style.display='flex'; waEl.href=DATA.waUrl; }
    else waEl.style.display='none';
    if(DATA.smsUrl){ smsEl.style.display='flex'; smsEl.href=DATA.smsUrl; }
    else smsEl.style.display='none';
  }

  // Logo splash
  // Mise à jour logo splash
  const splashLogoEl = document.getElementById('splash-logo');
  if(splashLogoEl) renderLogo(DATA.logo, splashLogoEl);
  document.getElementById('splash-title').textContent=DATA.titre;
  document.getElementById('splash-sub').textContent=DATA.sousTitre;
}

function enterApp(){
  if(!LANG){ showToast('Choisissez une langue !'); return; }
  localStorage.setItem('panneau_lang',LANG);
  localStorage.setItem(LAST_VISIT_KEY, Date.now().toString());
  const splash=document.getElementById('splash');
  splash.classList.add('hide');
  setTimeout(()=>{ splash.style.display='none'; document.getElementById('app').style.display='block'; renderAll(); },400);
}

/* ═══════════════════════════════════════════════════════
   COULEUR
═══════════════════════════════════════════════════════ */
function applyColor(hex){
  const r=document.documentElement;
  r.style.setProperty('--accent',hex);
  r.style.setProperty('--accent-dk',darken(hex,20));
  r.style.setProperty('--accent-bg',lighten(hex,92));
  r.style.setProperty('--accent-bg2',lighten(hex,88));
  document.getElementById('meta-theme').setAttribute('content',hex);
}
function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>Math.min(255,Math.max(0,Math.round(v))).toString(16).padStart(2,'0')).join('');}
function darken(h,p){const[r,g,b]=hexToRgb(h),f=(100-p)/100;return rgbToHex(r*f,g*f,b*f);}
function lighten(h,p){const[r,g,b]=hexToRgb(h),f=p/100;return rgbToHex(r+(255-r)*f,g+(255-g)*f,b+(255-b)*f);}
function setColor(hex){document.getElementById('cfg-color').value=hex;updateColorPreview();}
function updateColorPreview(){applyColor(document.getElementById('cfg-color').value);}

═══════════════════════════════════════════════════════ */
function renderLogo(logo,el){
  if(!el||!logo) return;
  try{
    el.innerHTML='';
    if(logo.type==='url'&&logo.value) el.innerHTML='<img src="'+esc(logo.value)+'" onerror="this.style.display=\'none\'">';
    else if(logo.type==='emoji') el.innerHTML='<span class="logo-emoji">'+(logo.value||'🏛️')+'</span>';
    else el.innerHTML='<span class="logo-initials">'+((logo.value||'ELU').toUpperCase().slice(0,3))+'</span>';
  }catch(e){}
}

  if(!typeEl) return;
  const type=typeEl.value;
  const sI=document.getElementById('logo-initials-section');
  const sE=document.getElementById('logo-emoji-section');
  const sU=document.getElementById('logo-url-section');
  if(sI) sI.style.display=type==='initials'?'block':'none';
  if(sE) sE.style.display=type==='emoji'?'block':'none';
  if(sU) sU.style.display=type==='url'?'block':'none';
  let val='';
  if(type==='initials') val=(document.getElementById('logo-initials-val')?.value||'ELU').toUpperCase().slice(0,3);

  else val=document.getElementById('logo-url-val')?.value||'';
  const pb=document.getElementById('logo-preview-box');
  if(pb) renderLogo({type,value:val},pb);
  renderLogo({type,value:val},document.getElementById('hdr-logo-wrap'));
}

function renderTabContent(tab){
  const el=document.getElementById('content-'+tab.id);
  if(!el) return;
  if(tab.type==='regles')      el.innerHTML=buildRegles();
  else if(tab.type==='contacts')   el.innerHTML=buildContacts();
  else if(tab.type==='horaires')   el.innerHTML=buildHoraires();
  else if(tab.type==='annonces')   el.innerHTML=buildAnnonces();
  else if(tab.type==='evenements') el.innerHTML=buildEvents();
  else if(tab.type==='libre'){
    const cc=DATA.customContent[tab.id] || {};
    const txt=cc ? tl(cc) : '';
    el.innerHTML = txt ? `<div class="free-content">${txt}</div>` : `<p style="color:var(--muted);font-size:14px">${t('noContent')}</p>`;
  }
  else if(tab.type==='plan'){
    const cc=DATA.customContent[tab.id] || {};
    const img=cc.planImage || '';
    const cap=cc.planCaption || '';
    if(img){
      const openLbl = LANG==='nl'?'Openen in volledig scherm':LANG==='en'?'Open full screen':'Plein écran';
      el.innerHTML=`<div class="plan-wrap">
        <img class="plan-img" src="${esc(img)}" alt="Plan" onclick="openPlanModal('${esc(img)}')">
        ${cap?`<div class="plan-caption">${esc(cap)}</div>`:''}
        <button class="plan-fullscreen-btn" onclick="openPlanModal('${esc(img)}')">🔍 ${openLbl}</button>
      </div>`;
    } else {
      el.innerHTML=`<p style="color:var(--muted);font-size:14px">${t('noContent')}</p>`;
    }
  }
  else if(tab.type==='liens') el.innerHTML=buildLiens(tab.id);
}

/* ── BUILDERS ── */
function buildLiens(tabId){
  const items=(DATA.customContent[tabId]?.items)||[];
  if(!items.length) return `<p style="color:var(--muted);font-size:14px;padding:16px">${t('noContent')}</p>`;
  return `<div class="liens-grid">`+items.map(item=>{
    const url=item.url||'#';
    const img=item.image||'';
    const imgHtml=img?`<img src="${esc(img)}" class="lien-btn-img">`:`<span class="lien-btn-fallback">🔗</span>`;
    const target=url==='#'?'':'target="_blank" rel="noopener"';
    const lines=[
      item.label?.fr?`<span class="lien-btn-line"><span class="lien-btn-lang">FR</span>${esc(item.label.fr)}</span>`:'',
      item.label?.nl?`<span class="lien-btn-line"><span class="lien-btn-lang">NL</span>${esc(item.label.nl)}</span>`:'',
      item.label?.en?`<span class="lien-btn-line"><span class="lien-btn-lang">EN</span>${esc(item.label.en)}</span>`:'',
    ].filter(Boolean).join('');
    return `<a href="${esc(url)}" ${target} class="lien-btn">${imgHtml}<div class="lien-btn-texts">${lines}</div></a>`;
  }).join('')+'</div>';
}

function buildRegles(){
  if(!DATA.regles.length) return `<p style="color:var(--muted)">${t('noContent')}</p>`;
  return `<div class="rules-grid">`+DATA.regles.map((r,i)=>{
    const d=r[LANG]||r.fr||{};
    return `<div class="rule-card"><div class="rule-num">${i+1}</div>
      <div class="rule-icon-wrap">${RULE_ICONS[i%RULE_ICONS.length]}</div>
      <h3>${esc(d.titre||'')}</h3><p>${esc(d.texte||'')}</p></div>`;
  }).join('')+`</div>`;
}

function buildContacts(){
  if(!DATA.contacts.length) return `<p style="color:var(--muted)">${t('noContent')}</p>`;
  return `<div class="contacts-list">`+DATA.contacts.map(c=>{
    const barColor = contactBarColor(c.icon);
    const btnColor = contactBtnColor(c.icon);
    const isEmail  = c.tel && c.tel.includes('@');
    const href     = isEmail ? `mailto:${c.tel}` : `tel:${c.tel.replace(/[\s()]/g,'')}`;
    return `<div class="contact-card" style="--bar:${barColor}">
      ${renderContactIcon(c.icon)}
      <div class="contact-info"><div class="contact-name">${esc(c.nom)}</div><div class="contact-role">${esc(tl(c.role))}</div></div>
      <a class="contact-tel" href="${href}" style="background:${btnColor}">

function buildHoraires(){

function buildAnnonces(){

    info:`<svg viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    normal:`<svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>`,
  };
  return `<div class="annonces-list">`+sorted.map(a=>{
    const d2=a[LANG]||a.fr||{};
    const dateStr=a.date?new Date(a.date).toLocaleDateString(LANG==='nl'?'nl-BE':LANG==='en'?'en-GB':'fr-BE',{day:'2-digit',month:'short',year:'numeric'}):'';

// Sous-titres pour les cartes de la grille
const NAV_SUBS = {
  fr:{regles:'Règles & propreté',contacts:'Numéros utiles',horaires:'Services & collecte',annonces:'Informations',evenements:'Agenda',incendie:'Évacuation',checkout:'Départ',catering:'Mess & sandwichs'},
  nl:{regles:'Regels & netheid',contacts:'Nuttige nummers',horaires:'Diensten & inzameling',annonces:'Informatie',evenements:'Agenda',incendie:'Evacuatie',checkout:'Vertrek',catering:'Mess & broodjes'},
  en:{regles:'Rules & cleanliness',contacts:'Useful numbers',horaires:'Services & collection',annonces:'Information',evenements:'Agenda',incendie:'Evacuation',checkout:'Departure',catering:'Mess & sandwiches'},
};

// Onglets pleine largeur (plus importants)
const FULL_TABS = ['incendie','contacts'];
const RED_TABS  = ['incendie'];

function renderNavGrid(){
  const grid = document.getElementById('nav-grid');
  if(!grid) return;
  const active = DATA.tabs.filter(t=>t.active);
  const L = LANG;

  // Greeting
  const hour = new Date().getHours();
  const greetIcon = hour<12?'☀️':hour<18?'🌤️':'🌙';
  const greetTitle = {fr:{0:'Bonjour',18:'Bonsoir',12:'Bon après-midi'},nl:{0:'Goedemorgen',18:'Goedenavond',12:'Goedemiddag'},en:{0:'Good morning',18:'Good evening',12:'Good afternoon'}};
  const gk = hour<12?0:hour<18?12:18;
  const greetSub = {fr:'Que recherchez-vous ?',nl:'Wat zoekt u ?',en:'What are you looking for?'};
  const gi = document.getElementById('greeting-icon');
  const gt = document.getElementById('greeting-title');
  const gs = document.getElementById('greeting-sub');
  if(gi) gi.textContent=greetIcon;
  if(gt) gt.textContent=(greetTitle[L]||greetTitle.fr)[gk];
  if(gs) gs.textContent=(greetSub[L]||greetSub.fr);

  // Compter les nouveautés
  const newCount = DATA.annonces.filter(a=>a.isNew).length + DATA.events.filter(e=>e.isNew).length;

  // Calculer les cartes full : forcées + orpheline éventuelle
  const normalCards = active.filter(t=>!FULL_TABS.includes(t.id));
  const orphanId = (normalCards.length % 2 !== 0)
    ? normalCards[normalCards.length - 1]?.id
    : null;
  const cardIsFull = (tab) => FULL_TABS.includes(tab.id) || tab.id === orphanId;

  const orderedTabs = active
    .map(tab => ({ tab, isFull: cardIsFull(tab) }))
    .sort((a, b) => Number(b.isFull) - Number(a.isFull) || active.indexOf(a.tab) - active.indexOf(b.tab));

  grid.innerHTML = orderedTabs.map(({tab, isFull})=>{
    const nom = tl(tab.nom);
    const sub = (NAV_SUBS[L]||NAV_SUBS.fr)[tab.id] || '';
    const iconKey = tab.id in NAV_ICONS ? tab.id : tab.type in NAV_ICONS ? tab.type : 'libre';
    const isRed   = RED_TABS.includes(tab.id) || tab.color==='#EF4444';
    const iconColor = isRed ? 'var(--red)' : 'var(--accent)';
    const iconSvg = (NAV_ICONS[iconKey]||NAV_ICONS.libre).replace(/currentColor/g, iconColor);

    // Badge nouveautés
    let badge = '';
    const newLabel = LANG==='nl'?'Nieuw':LANG==='en'?'New':'Nouveau';
    if(tab.id==='annonces'   && DATA.annonces.some(a=>a.isNew)) badge=`<span class="nav-card-badge">${newLabel}</span>`;
    if(tab.id==='evenements' && DATA.events.some(e=>e.isNew))   badge=`<span class="nav-card-badge">${newLabel}</span>`;

    return `<div class="nav-card${isRed?' red-card':''}${isFull?' full':''}" onclick="openContent('${tab.id}')">
      ${badge}
      <div class="nav-card-icon">${iconSvg}</div>
      ${isFull
        ?`<div class="nav-card-text"><div class="nav-card-label">${esc(nom)}</div><div class="nav-card-sub">${esc(sub)}</div></div>`
        :`<div class="nav-card-label">${esc(nom)}</div><div class="nav-card-sub">${esc(sub)}</div>`}
    </div>`;
  }).join('');
}

function openContent(tabId){
  const tab = DATA.tabs.find(t=>t.id===tabId);
  if(!tab) return;
  const cs=document.getElementById('content-screen');
  if(!cs) return;
  const nom = tl(tab.nom);
  const isRed = RED_TABS.includes(tabId) || tab.color==='#EF4444';

  // Topbar
  const topbar = document.getElementById('content-topbar');
  const topTitle = document.getElementById('content-topbar-title');
  if(topbar){ topbar.className='content-topbar'+(isRed?' red-bar':''); }
  if(topTitle) topTitle.textContent = nom;

  // Contenu
  const body = document.getElementById('content-body');
  if(tab.type==='regles')          body.innerHTML = buildRegles();
  else if(tab.type==='contacts')   body.innerHTML = buildContacts();
  else if(tab.type==='horaires')   body.innerHTML = buildHoraires();
  else if(tab.type==='annonces')   body.innerHTML = buildAnnonces();
  else if(tab.type==='evenements') body.innerHTML = buildEvents();
  else if(tab.type==='libre'){
    const cc = DATA.customContent[tab.id] || {};
    const txt = tl(cc) || '';
    body.innerHTML = txt
      ? `<div class="free-content">${txt}</div>`
      : `<div class="empty-state">${t('noContent')}</div>`;
  }
  else if(tab.type==='plan'){
    const cc = DATA.customContent[tab.id] || {};
    const img = cc.planImage || '';
    const cap = cc.planCaption || '';
    if(img){
      const openLbl = LANG==='nl'?'Openen in volledig scherm':LANG==='en'?'Open full screen':'Plein écran';
      body.innerHTML = `<div class="plan-wrap">
        <img class="plan-img" src="${esc(img)}" alt="Plan" onclick="openPlanModal('${esc(img)}')">
        ${cap?`<div class="plan-caption">${esc(cap)}</div>`:''}
        <button class="plan-fullscreen-btn" onclick="openPlanModal('${esc(img)}')">🔍 ${openLbl}</button>
      </div>`;
    } else {
      body.innerHTML = `<div class="empty-state">${t('noContent')}</div>`;
    }
  }
  else if(tab.type==='liens') body.innerHTML=buildLiens(tab.id);

  // Afficher + mémoriser l'onglet actif pour le changement de langue
  cs.dataset.activeTab=tabId;
  document.getElementById('home-screen').style.display='none';
  cs.style.display='block';
  window.scrollTo(0,0);
}

function openPlanModal(src){
  const m=document.getElementById('plan-modal');
  const i=document.getElementById('plan-modal-img');
  if(m&&i){ i.src=src; m.classList.add('open'); document.body.style.overflow='hidden'; }
}
function closePlanModal(){
  const m=document.getElementById('plan-modal');
  if(m){ m.classList.remove('open'); document.body.style.overflow=''; }
}
